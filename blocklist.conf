# blocklist.conf
# Simple key=value config. Lines starting with # are ignored.
# Repeat keys to add multiple entries (e.g. list_url=... multiple times)

# Example sources (one per line):
list_url=http://lists.blocklist.de/lists/all.txt
list_url=https://www.spamhaus.org/drop/drop.txt
list_url=https://raw.githubusercontent.com/ktsaou/blocklist-ipsets/master/firehol_level1.netset
list_url=https://raw.githubusercontent.com/ktsaou/blocklist-ipsets/master/firehol_level2.netset
list_url=https://raw.githubusercontent.com/ktsaou/blocklist-ipsets/master/firehol_level3.netset

log_file=/var/log/blocklist
white_list=/etc/blocklist/whitelist
black_list=/etc/blocklist/blacklist
